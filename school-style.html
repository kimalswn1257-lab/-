<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic',-apple-system,sans-serif;background:linear-gradient(135deg,#e3f2fd,#bbdefb,#90caf9);min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:flex-start}

.screen{display:none}.screen.active{display:block}

.subtitle{text-align:center;color:#555;font-size:1.05rem;margin-bottom:8px;line-height:1.5}
.icon-big{font-size:3.5rem;text-align:center;margin-bottom:16px}
.btn{background:linear-gradient(135deg,#1e88e5,#42a5f5);color:#fff;border:none;padding:15px 36px;font-size:1.15rem;border-radius:50px;cursor:pointer;transition:all .3s;font-weight:700;margin-top:20px;display:inline-block}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(30,136,229,.4)}
.btn-stat{background:linear-gradient(135deg,#f57c00,#ffb74d)}

.input-group{margin:16px 0;text-align:center}

.input-group input:focus{border-color:#1e88e5}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.prog{font-size:1rem;color:#1565c0;font-weight:700}
.pbar-bg{width:100%;height:10px;background:#e3f2fd;border-radius:5px;margin-bottom:24px;overflow:hidden}
.pbar{height:100%;background:linear-gradient(90deg,#1e88e5,#42a5f5);border-radius:5px;transition:width .4s}
.situation{font-size:1.15rem;color:#333;font-weight:700;margin-bottom:20px;line-height:1.7;padding:18px;background:#e8f5e9;border-radius:14px;border-left:4px solid #43a047}
.choices{list-style:none;display:flex;flex-direction:column;gap:12px}
.choice-btn{width:100%;padding:16px 20px;font-size:1.05rem;text-align:left;background:#fafafa;border:2px solid #e0e0e0;border-radius:14px;cursor:pointer;transition:all .25s;font-weight:500;color:#333;line-height:1.5}
.choice-btn:hover{background:#e3f2fd;border-color:#42a5f5;transform:translateX(5px)}
.result-type{font-size:2rem;font-weight:900;color:#1565c0;margin:16px 0;text-align:center}
.result-section{margin:20px 0;padding:18px;border-radius:14px;text-align:left}
.result-section h3{font-size:1.1rem;margin-bottom:10px}
.result-section ul{padding-left:20px;line-height:2}
.section-green{background:#e8f5e9;border:1px solid #a5d6a7}.section-green h3{color:#2e7d32}
.section-blue{background:#e3f2fd;border:1px solid #90caf9}.section-blue h3{color:#1565c0}
.section-orange{background:#fff3e0;border:1px solid #ffcc80}.section-orange h3{color:#e65100}
.section-purple{background:#f3e5f5;border:1px solid #ce93d8}.section-purple h3{color:#6a1b9a}
.type-tab{display:inline-block;padding:8px 16px;margin:4px;border-radius:20px;cursor:pointer;font-size:.9rem;font-weight:600;border:2px solid #e0e0e0;background:#fafafa;transition:all .2s}
.type-tab:hover,.type-tab.active{background:#e3f2fd;border-color:#1e88e5;color:#1565c0}
.stat-card{background:#f5f5f5;border-radius:14px;padding:20px;margin:16px 0}
.stat-card h3{color:#1565c0;margin-bottom:12px}
.chart-box{max-width:400px;margin:16px auto}
.stat-summary{background:#e8f5e9;border-radius:12px;padding:16px;margin:12px 0;line-height:1.8;font-size:.95rem}
.stat-summary strong{color:#2e7d32}
.del-btn{background:#ef5350;color:#fff;border:none;padding:2px 8px;border-radius:10px;cursor:pointer;font-size:.75rem;margin-left:6px}
@media(max-width:600px){.container{padding:20px;border-radius:16px}h1{font-size:1.5rem}.situation{font-size:1.05rem}.choice-btn{font-size:.95rem;padding:14px 16px}.result-type{font-size:1.5rem}}
</style>
</head>
<body>
<div class="container">
<div class="screen active" id="startScreen"><div style="text-align:center;padding:40px 20px">
<div class="icon-big">🎮🏫✨</div>
<h1>나의 학교생활 스타일은?</h1>
<p class="subtitle">6학년 1학기 마무리 특별 테스트!</p>
<p class="subtitle">학교 상황에서 나라면 어떻게 할까?</p>

<div class="input-group"><input type="text" id="nickname" placeholder="이름 또는 번호 입력" maxlength="10"></div>

<button class="btn btn-stat" id="statBtn" style="margin-top:12px">📊 우리 반 통계 보기</button>

</div>
<div class="screen" id="resultScreen"><div style="text-align:center;padding:20px">

<div id="otherTypes" style="margin-top:24px;text-align:center"></div>

</div></div></div>

</div></div></div>
</div>
<script>

var questions=[
{situation:"쉬는 시간에 한 친구가 혼자 앉아 있어요.",choices:[

]},
{situation:"새로운 체험활동을 한대요!",choices:[

{text:"거절하고 싶은데 못 하고 그냥 보여준다",scores:{T:2,K:1}}
]},
{situation:"모둠에서 내가 하고 싶은 역할을 다른 친구도 원해요.",choices:[

{situation:"수업 중 이해가 안 되는 부분이 있어요.",choices:[

{situation:"학급 회장 선거가 있어요.",choices:[

{situation:"체육시간에 우리 팀이 지고 있어요.",choices:[

{text:"불만이지만 말 못하고 내가 대신 해버린다",scores:{T:2,R:1}}
]},
{situation:"미술 시간에 그림이 잘 안 되고 있어요.",choices:[
{text:"지우고 다시 그린다. 될 때까지!",scores:{G:3,D:1}},

{situation:"친구 두 명이 싸우고 있어요.",choices:[

]},
{situation:"점심시간에 급식 반찬이 싫어하는 거예요.",choices:[

// ========== 게임 로직 ==========
var cur=0,scores={R:0,C:0,K:0,S:0,D:0,P:0,G:0,L:0,F:0,M:0,T:0},nickname='';
var answers=[]; // 각 문제에서 선택한 인덱스 저장 (이전 문제 기능용)
var shuffledPerQ=[]; // 각 문제별 섞인 선택지 저장

function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});document.getElementById(id).classList.add('active')}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

function startTest(){
    nickname=document.getElementById('nickname').value.trim();
    if(!nickname){alert('이름이나 번호를 입력해주세요!');return}
    cur=0;scores={R:0,C:0,K:0,S:0,D:0,P:0,G:0,L:0,F:0,M:0,T:0};
    answers=[];shuffledPerQ=[];
    // 각 문제의 선택지를 미리 섞어놓기
    for(var i=0;i<questions.length;i++){shuffledPerQ.push(shuffle(questions[i].choices.slice()))}
    show('quizScreen');showQ();
}

function showQ(){
    var total=questions.length;
    document.getElementById('prog').textContent=(cur+1)+' / '+total;
    document.getElementById('pBar').style.width=(cur/total*100)+'%';
    document.getElementById('situation').textContent='상황 '+(cur+1)+'. '+questions[cur].situation;
    var ul=document.getElementById('choices');ul.innerHTML='';
    var labels=['A','B','C','D'];
    var sc=shuffledPerQ[cur];
    for(var i=0;i<sc.length;i++){
        var li=document.createElement('li');var btn=document.createElement('button');
        btn.className='choice-btn';btn.textContent=labels[i]+'. '+sc[i].text;
        btn.setAttribute('data-idx',i);
        btn.onclick=function(){pickChoice(parseInt(this.getAttribute('data-idx')))};
        li.appendChild(btn);ul.appendChild(li);
    }
    // 이전 버튼
    document.getElementById('prevBtn').style.display=cur>0?'inline-block':'none';
}

function pickChoice(idx){
    // 이전에 이 문제를 풀었으면 점수 되돌리기
    if(answers[cur]!==undefined){
        var prev=shuffledPerQ[cur][answers[cur]].scores;
        for(var k in prev){if(scores.hasOwnProperty(k))scores[k]-=prev[k]}
    }
    // 새 점수 반영
    var chosen=shuffledPerQ[cur][idx].scores;
    for(var k in chosen){if(scores.hasOwnProperty(k))scores[k]+=chosen[k]}
    answers[cur]=idx;
    cur++;
    if(cur>=questions.length)showResult();else showQ();
}

function goPrev(){
    if(cur>0){cur--;showQ()}
}

function getType(){
    var best=null,bestScore=-1;
    for(var i=0;i<types.length;i++){var sc=types[i].match(scores);if(sc>bestScore){bestScore=sc;best=types[i]}}
    return best;
}

function renderTypeDetail(t){
    var html='<div class="result-type">'+t.name+'</div>';
    html+='<p style="text-align:center;color:#555;font-size:1.05rem;margin-bottom:20px">'+t.desc+'</p>';
    html+='<div class="result-section section-green"><h3>🌟 강점</h3><ul>';
    for(var i=0;i<Math.min(4,t.strengths.length);i++)html+='<li>'+t.strengths[i]+'</li>';
    html+='</ul></div>';
    html+='<div class="result-section section-orange"><h3>🌈 성장 포인트</h3><ul>';
    for(var i=0;i<t.growth.length;i++)html+='<li>'+t.growth[i]+'</li>';
    html+='</ul></div>';
    html+='<div class="result-section section-blue"><h3>💼 추천 역할</h3><p>'+t.role+'</p><h3 style="margin-top:12px">🤝 친구와의 협력 방식</h3><p>'+t.collab+'</p></div>';
    html+='<div class="result-section section-purple"><h3>🎯 다음 학기 미션</h3><ul>';
    for(var i=0;i<t.missions.length;i++)html+='<li>'+t.missions[i]+'</li>';
    html+='</ul></div>';
    return html;
}

function showResult(){
    show('resultScreen');var t=getType();
    saveResult(nickname,t.key,t.name);
    document.getElementById('resultContent').innerHTML=renderTypeDetail(t);
    // 다른 유형 탭
    var tabs='<p style="font-size:.95rem;color:#888;margin-bottom:8px">👇 다른 유형도 궁금하면 눌러보세요</p>';
    for(var i=0;i<types.length;i++){
        tabs+='<span class="type-tab'+(types[i].key===t.key?' active':'')+'" data-idx="'+i+'">'+types[i].name+'</span>';
    }
    document.getElementById('otherTypes').innerHTML=tabs;
    document.getElementById('otherTypeDetail').innerHTML='';
    // 탭 클릭 이벤트
    document.querySelectorAll('.type-tab').forEach(function(tab){
        tab.onclick=function(){
            document.querySelectorAll('.type-tab').forEach(function(x){x.classList.remove('active')});
            this.classList.add('active');
            var idx=parseInt(this.getAttribute('data-idx'));
            document.getElementById('otherTypeDetail').innerHTML=renderTypeDetail(types[idx]);
        }
    });
    confetti({particleCount:120,spread:70,origin:{y:.6}});
}

// ========== 통계 ==========
var TEACHER_PW='1234'; // 교사 비밀번호 (원하면 변경)

function saveResult(name,key,typeName){
    var data=JSON.parse(localStorage.getItem('schoolStyle')||'[]');
    data.push({name:name,type:key,typeName:typeName,date:new Date().toLocaleDateString()});
    localStorage.setItem('schoolStyle',JSON.stringify(data));
}

function showStat(){
    show('statScreen');
    var data=JSON.parse(localStorage.getItem('schoolStyle')||'[]');
    if(data.length===0){document.getElementById('statContent').innerHTML='<p style="text-align:center;color:#888;padding:40px">아직 참여한 사람이 없어요!</p>';return}
    var counts={growth:0,collab:0,challenge:0,diligent:0,happy:0,careful:0};
    var names={growth:'🌱 성장 새싹형',collab:'🤝 협력 리더형',challenge:'🚀 도전 탐험가형',diligent:'📚 성실 학습가형',happy:'😊 행복 메이커형',careful:'🐢 신중 관찰자형'};
    for(var i=0;i<data.length;i++){if(counts.hasOwnProperty(data[i].type))counts[data[i].type]++}
    var total=data.length;
    var maxType='',maxCount=0;for(var k in counts){if(counts[k]>maxCount){maxCount=counts[k];maxType=k}}
    var html='<div class="stat-card"><h3>📈 참여: 총 '+total+'명</h3><div class="chart-box"><canvas id="typeChart"></canvas></div></div>';
    var strengthMap={growth:'끈기와 자기주도',collab:'협력과 배려',challenge:'도전과 용기',diligent:'책임감과 성실',happy:'긍정과 사회성',careful:'신중함과 관찰력'};
    html+='<div class="stat-summary"><strong>우리 반 대표 유형:</strong> '+names[maxType]+' ('+maxCount+'명)<br><strong>우리 반 강점:</strong> '+strengthMap[maxType]+'이 뛰어나요!</div>';
    html+='<div class="stat-card"><h3>👥 참여자</h3><div style="line-height:2.2">';
    for(var i=0;i<data.length;i++){html+='<span style="display:inline-block;background:#e3f2fd;padding:4px 12px;border-radius:20px;margin:4px;font-size:.85rem">'+data[i].name+' - '+data[i].typeName+'</span>'}
    html+='</div></div>';
    document.getElementById('statContent').innerHTML=html;
    setTimeout(function(){
        var ctx=document.getElementById('typeChart');
        if(ctx){new Chart(ctx,{type:'doughnut',data:{labels:['성장 새싹','협력 리더','도전 탐험가','성실 학습가','행복 메이커','신중 관찰자'],datasets:[{data:[counts.growth,counts.collab,counts.challenge,counts.diligent,counts.happy,counts.careful],backgroundColor:['#66bb6a','#42a5f5','#ff7043','#ab47bc','#ffa726','#78909c']}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:12}}}}}})}
    },100);
}

function resetStat(){
    var pw=prompt('교사 비밀번호를 입력하세요:');
    if(pw===TEACHER_PW){
        if(confirm('정말 모든 통계를 초기화할까요?')){
            localStorage.removeItem('schoolStyle');
            showStat();
            alert('초기화 완료!');
        }
    }else if(pw!==null){
        alert('비밀번호가 틀렸습니다.');
    }
}

// ========== 이벤트 ==========
document.getElementById('startBtn').onclick=startTest;
document.getElementById('statBtn').onclick=showStat;
document.getElementById('statBtn2').onclick=showStat;
document.getElementById('retryBtn').onclick=function(){show('startScreen')};
document.getElementById('backBtn').onclick=function(){show('startScreen')};
document.getElementById('resetBtn').onclick=resetStat;
document.getElementById('prevBtn').onclick=goPrev;
</script>
